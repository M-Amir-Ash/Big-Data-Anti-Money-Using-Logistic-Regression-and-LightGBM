project:
  name: "SAML-D AML Big Data Fraud Detection"
  random_seed: 42

paths:
  raw_data_dir: "data/raw"
  processed_data_dir: "data/processed"
  sample_data_dir: "data/sample"
  figures_dir: "outputs/figures"
  metrics_dir: "outputs/metrics"
  models_dir: "outputs/models"
  reports_dir: "outputs/reports"
  logs_dir: "outputs/logs"

spark:
  app_name: "SAML-D AML Big Data Fraud Detection"
  master: "local[*]"
  driver_memory: "8g"
  executor_memory: "8g"
  shuffle_partitions: 64
  default_parallelism: 64

data:
  raw_filename_candidates:
    - "SAML-D.csv"
    - "SAML_D.csv"
    - "saml-d.csv"
    - "saml_d.csv"
  target_column: "Is_laundering"
  type_column: "Laundering_type"
  amount_column_candidates:
    - "Amount"
    - "amount"
  time_column_candidates:
    - "Date"
    - "Time"
    - "Timestamp"
    - "DateTime"
    - "Time and Date"
  sender_account_candidates:
    - "Sender_account"
    - "Sender Account"
    - "SenderAccount"
    - "Sender"
    - "From Account"
    - "FromAccount"
  receiver_account_candidates:
    - "Receiver_account"
    - "Receiver Account"
    - "ReceiverAccount"
    - "Receiver"
    - "To Account"
    - "ToAccount"

sampling:
  suspicious_keep_fraction: 1.0
  normal_sample_fraction_for_training: 0.05
  max_rows_for_training_pandas: 500000
  train_ratio: 0.70
  valid_ratio: 0.15
  test_ratio: 0.15

model:
  main_model: "lightgbm"
  baseline_model: "logistic_regression"
  lightgbm:
    n_estimators: 300
    learning_rate: 0.05
    num_leaves: 31
    max_depth: -1
    subsample: 0.8
    colsample_bytree: 0.8
    random_state: 42
    n_jobs: -1

pipeline:
  run_eda: true
  run_preprocessing: true
  run_feature_engineering: true
  run_sampling: true
  run_training: true
  run_visualization: true
  run_report_export: true
